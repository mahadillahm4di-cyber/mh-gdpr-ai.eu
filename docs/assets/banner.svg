<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Decorative EU stars circle -->
  <g transform="translate(100, 100)" fill="#3b82f6" opacity="0.9">
    <circle cx="0" cy="-35" r="4"/>
    <circle cx="17.5" cy="-30.3" r="4"/>
    <circle cx="30.3" cy="-17.5" r="4"/>
    <circle cx="35" cy="0" r="4"/>
    <circle cx="30.3" cy="17.5" r="4"/>
    <circle cx="17.5" cy="30.3" r="4"/>
    <circle cx="0" cy="35" r="4"/>
    <circle cx="-17.5" cy="30.3" r="4"/>
    <circle cx="-30.3" cy="17.5" r="4"/>
    <circle cx="-35" cy="0" r="4"/>
    <circle cx="-30.3" cy="-17.5" r="4"/>
    <circle cx="-17.5" cy="-30.3" r="4"/>
  </g>

  <!-- Shield icon in center of stars -->
  <g transform="translate(88, 82)">
    <path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7L12 2zm0 2.18l7 3.82v4c0 4.52-3.13 8.76-7 9.93C8.13 20.76 5 16.52 5 12V8l7-3.82z" fill="#3b82f6" transform="scale(1.8)"/>
    <path d="M10 15.5l-3.5-3.5 1.41-1.41L10 12.67l5.59-5.59L17 8.5l-7 7z" fill="#22c55e" transform="scale(1.8)"/>
  </g>

  <!-- Title -->
  <text x="180" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white">mh-gdpr-ai.eu</text>

  <!-- Subtitle -->
  <text x="180" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8">GDPR-compliant LLM routing with real-time PII detection</text>

  <!-- Tags -->
  <rect x="180" y="138" width="55" height="24" rx="12" fill="url(#accent)" opacity="0.2"/>
  <text x="207" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">GDPR</text>

  <rect x="245" y="138" width="40" height="24" rx="12" fill="url(#accent)" opacity="0.2"/>
  <text x="265" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">PII</text>

  <rect x="295" y="138" width="80" height="24" rx="12" fill="url(#accent)" opacity="0.2"/>
  <text x="335" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">EU Routing</text>

  <rect x="385" y="138" width="75" height="24" rx="12" fill="url(#accent)" opacity="0.2"/>
  <text x="422" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">Presidio</text>

  <rect x="470" y="138" width="80" height="24" rx="12" fill="#22c55e" opacity="0.15"/>
  <text x="510" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#86efac" text-anchor="middle">Open Source</text>

