  <!-- Extra straw strands -->
  <path d="M150 322 L220 314" fill="none" stroke="#b45309" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M680 314 L750 322" fill="none" stroke="#b45309" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M300 335 L370 326" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M530 326 L600 335" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>
