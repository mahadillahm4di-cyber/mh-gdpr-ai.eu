<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="egg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fffbeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="egg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7ed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed7aa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="egg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef08a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- ============================================ -->
  <!-- CIEL (child drawing style) -->
  <!-- ============================================ -->
  <rect width="512" height="512" rx="80" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="440" cy="70" r="45" fill="#fbbf24"/>
  <circle cx="440" cy="70" r="38" fill="#fde047"/>
  <!-- Sun rays -->
  <line x1="440" y1="10" x2="440" y2="0" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
  <line x1="480" y1="30" x2="495" y2="18" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
  <line x1="498" y1="70" x2="512" y2="70" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
  <line x1="480" y1="110" x2="495" y2="122" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
  <line x1="400" y1="30" x2="388" y2="18" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
  <line x1="382" y1="70" x2="370" y2="70" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
  <line x1="400" y1="110" x2="388" y2="122" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
  <line x1="440" y1="130" x2="440" y2="140" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>

  <!-- Clouds (puffy, child drawing) -->
  <!-- Cloud 1 -->
  <circle cx="80" cy="60" r="30" fill="white" opacity="0.85"/>
  <circle cx="110" cy="50" r="35" fill="white" opacity="0.85"/>
  <circle cx="145" cy="58" r="28" fill="white" opacity="0.85"/>
  <circle cx="95" cy="75" r="25" fill="white" opacity="0.8"/>
  <circle cx="130" cy="72" r="27" fill="white" opacity="0.8"/>

  <!-- Cloud 2 -->
  <circle cx="260" cy="40" r="25" fill="white" opacity="0.7"/>
  <circle cx="285" cy="32" r="30" fill="white" opacity="0.7"/>
  <circle cx="315" cy="38" r="24" fill="white" opacity="0.7"/>
  <circle cx="275" cy="52" r="22" fill="white" opacity="0.65"/>
  <circle cx="300" cy="48" r="24" fill="white" opacity="0.65"/>

  <!-- Cloud 3 (small) -->
  <circle cx="50" cy="140" r="18" fill="white" opacity="0.5"/>
  <circle cx="70" cy="134" r="22" fill="white" opacity="0.5"/>
  <circle cx="92" cy="140" r="16" fill="white" opacity="0.45"/>

  <!-- ============================================ -->
  <!-- GAZON (child drawing green grass) -->
  <!-- ============================================ -->

  <!-- Ground base -->
  <path d="M0 420 C60 400 120 415 180 405 C240 415 300 400 360 410 C420 400 480 415 512 405 L512 512 L0 512 Z"
        fill="#4ade80"/>
  <path d="M0 430 C70 418 140 428 210 420 C280 428 350 418 420 425 C460 418 500 428 512 422 L512 512 L0 512 Z"
        fill="#22c55e"/>
  <path d="M0 445 C80 435 160 442 240 436 C320 442 400 435 480 440 L512 438 L512 512 L0 512 Z"
        fill="#16a34a"/>

  <!-- Grass blades (child drawing — simple spikes) -->
  <!-- Left side -->
  <path d="M15 420 L12 395 L18 420" fill="#22c55e"/>
  <path d="M28 418 L24 390 L32 418" fill="#4ade80"/>
  <path d="M42 422 L38 398 L46 422" fill="#16a34a"/>
  <path d="M55 419 L52 392 L60 419" fill="#22c55e"/>
  <path d="M70 424 L66 400 L74 424" fill="#4ade80"/>
  <path d="M82 417 L78 388 L86 417" fill="#16a34a"/>
  <path d="M96 421 L92 396 L100 421" fill="#22c55e"/>

  <!-- Right side -->
  <path d="M415 412 L412 386 L420 412" fill="#22c55e"/>
  <path d="M430 416 L426 390 L434 416" fill="#4ade80"/>
  <path d="M445 410 L442 382 L450 410" fill="#16a34a"/>
  <path d="M458 414 L454 388 L462 414" fill="#22c55e"/>
  <path d="M472 418 L468 394 L476 418" fill="#4ade80"/>
  <path d="M486 412 L482 385 L490 412" fill="#16a34a"/>
  <path d="M500 416 L496 392 L504 416" fill="#22c55e"/>

  <!-- Small flowers in grass -->
  <!-- Flower left -->
  <circle cx="35" cy="410" r="5" fill="#f472b6"/>
  <circle cx="35" cy="410" r="2" fill="#fbbf24"/>
  <!-- Flower right -->
  <circle cx="470" cy="405" r="5" fill="#c084fc"/>
  <circle cx="470" cy="405" r="2" fill="#fbbf24"/>
  <!-- Flower far left -->
  <circle cx="75" cy="415" r="4" fill="#fb923c"/>
  <circle cx="75" cy="415" r="1.5" fill="#fbbf24"/>
  <!-- Flower far right -->
  <circle cx="440" cy="412" r="4" fill="#f472b6"/>
  <circle cx="440" cy="412" r="1.5" fill="#fbbf24"/>

  <!-- ============================================ -->
  <!-- GRAND NID (full width, on the grass) -->
  <!-- ============================================ -->

  <!-- Nest back straws -->
  <path d="M40 360 C100 340 180 370 260 350 C340 370 420 340 480 360" fill="none" stroke="#a16207" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  <path d="M30 380 C110 355 190 385 270 365 C350 385 430 355 490 380" fill="none" stroke="#92400e" stroke-width="7" stroke-linecap="round" opacity="0.25"/>

  <!-- Egg left -->
  <ellipse cx="138" cy="250" rx="95" ry="130" fill="url(#egg2)" filter="url(#shadow)"/>
  <ellipse cx="120" cy="210" rx="30" ry="50" fill="white" opacity="0.18"/>

  <!-- Egg center (biggest) -->
  <ellipse cx="262" cy="230" rx="110" ry="150" fill="url(#egg1)" filter="url(#shadow)"/>
  <ellipse cx="240" cy="180" rx="35" ry="58" fill="white" opacity="0.2"/>

  <!-- Egg right -->
  <ellipse cx="382" cy="255" rx="90" ry="125" fill="url(#egg3)" filter="url(#shadow)"/>
  <ellipse cx="365" cy="215" rx="28" ry="48" fill="white" opacity="0.18"/>

  <!-- Nest front rim -->
  <path d="M20 390 C80 350 160 380 256 360 C352 380 432 350 492 390"
        fill="none" stroke="#a16207" stroke-width="12" stroke-linecap="round"/>
  <path d="M28 400 C90 365 170 390 256 372 C342 390 422 365 484 400"
        fill="none" stroke="#92400e" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <path d="M36 410 C100 380 180 400 256 384 C332 400 412 380 476 410"
        fill="none" stroke="#a16207" stroke-width="9" stroke-linecap="round" opacity="0.6"/>
  <path d="M44 420 C108 392 188 408 256 394 C324 408 404 392 468 420"
        fill="none" stroke="#78350f" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <path d="M52 428 C116 404 196 416 256 404 C316 416 396 404 460 428"
        fill="none" stroke="#92400e" stroke-width="7" stroke-linecap="round" opacity="0.4"/>

  <!-- Extra straw strands -->
  <path d="M60 395 L120 385" fill="none" stroke="#b45309" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <path d="M390 385 L452 395" fill="none" stroke="#b45309" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <path d="M150 408 L210 398" fill="none" stroke="#92400e" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M310 398 L370 408" fill="none" stroke="#92400e" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>
</svg>
