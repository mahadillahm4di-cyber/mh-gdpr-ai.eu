<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>

  <!-- Shield icon -->
  <g transform="translate(100, 160)">
    <path d="M60 0 L120 30 L120 80 C120 130 90 160 60 180 C30 160 0 130 0 80 L0 30 Z"
          fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.9"/>
    <path d="M60 20 L105 42 L105 80 C105 118 82 142 60 158 C38 142 15 118 15 80 L15 42 Z"
          fill="url(#accent)" opacity="0.15"/>
    <!-- Checkmark -->
    <polyline points="38,90 55,107 82,70" fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="260" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-1">mh-gdpr-ai.eu</text>

  <!-- Subtitle -->
  <text x="260" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#94a3b8" font-weight="400">GDPR-compliant LLM routing with real-time PII detection</text>

  <!-- Separator -->
  <rect x="260" y="300" width="80" height="3" rx="2" fill="url(#accent)"/>

  <!-- Feature pills -->
  <!-- PII Detection -->
  <rect x="260" y="330" width="200" height="40" rx="20" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="360" y="356" font-family="system-ui, sans-serif" font-size="16" fill="#60a5fa" text-anchor="middle" font-weight="600">PII Detection</text>

  <!-- EU Routing -->
  <rect x="480" y="330" width="190" height="40" rx="20" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="575" y="356" font-family="system-ui, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="600">Sovereign Routing</text>

  <!-- 3 Lines -->
  <rect x="690" y="330" width="180" height="40" rx="20" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="780" y="356" font-family="system-ui, sans-serif" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">3 Lines of Code</text>

  <!-- Code snippet area -->
  <rect x="260" y="400" width="760" height="160" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Code window dots -->
  <circle cx="284" cy="420" r="6" fill="#ff5f57"/>
  <circle cx="304" cy="420" r="6" fill="#febc2e"/>
  <circle cx="324" cy="420" r="6" fill="#28c840"/>

  <!-- Code text -->
  <text x="284" y="458" font-family="monospace" font-size="16" fill="#7c3aed">from</text>
  <text x="332" y="458" font-family="monospace" font-size="16" fill="#e2e8f0"> sovereign_gateway </text>
  <text x="528" y="458" font-family="monospace" font-size="16" fill="#7c3aed">import</text>
  <text x="588" y="458" font-family="monospace" font-size="16" fill="#22d3ee"> SovereignGateway</text>

  <text x="284" y="488" font-family="monospace" font-size="16" fill="#e2e8f0">gateway = </text>
  <text x="380" y="488" font-family="monospace" font-size="16" fill="#22d3ee">SovereignGateway</text>
  <text x="547" y="488" font-family="monospace" font-size="16" fill="#e2e8f0">()</text>

  <text x="284" y="518" font-family="monospace" font-size="16" fill="#e2e8f0">result = gateway.</text>
  <text x="435" y="518" font-family="monospace" font-size="16" fill="#22d3ee">route</text>
  <text x="475" y="518" font-family="monospace" font-size="16" fill="#e2e8f0">([{</text>
  <text x="505" y="518" font-family="monospace" font-size="16" fill="#a5d6ff">"role"</text>
  <text x="555" y="518" font-family="monospace" font-size="16" fill="#e2e8f0">: </text>
  <text x="570" y="518" font-family="monospace" font-size="16" fill="#a5d6ff">"user"</text>
  <text x="625" y="518" font-family="monospace" font-size="16" fill="#e2e8f0">, ...}])</text>

  <!-- Result line -->
  <text x="284" y="548" font-family="monospace" font-size="16" fill="#6a737d"># PII detected → EU only. No PII → cheapest.</text>

  <!-- Bottom stats -->
  <text x="100" y="600" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">50 tests</text>
  <circle cx="182" cy="595" r="3" fill="#475569"/>
  <text x="198" y="600" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">15+ PII types</text>
  <circle cx="330" cy="595" r="3" fill="#475569"/>
  <text x="346" y="600" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">20+ models</text>
  <circle cx="458" cy="595" r="3" fill="#475569"/>
  <text x="474" y="600" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">&lt;50ms latency</text>
  <circle cx="600" cy="595" r="3" fill="#475569"/>
  <text x="616" y="600" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">Apache 2.0</text>

  <!-- EU flag hint -->
  <g transform="translate(1100, 150)" opacity="0.12">
    <rect width="120" height="80" rx="4" fill="#003399"/>
    <!-- Stars simplified -->
    <circle cx="60" cy="18" r="4" fill="#FFCC00"/>
    <circle cx="42" cy="22" r="4" fill="#FFCC00"/>
    <circle cx="78" cy="22" r="4" fill="#FFCC00"/>
    <circle cx="36" cy="38" r="4" fill="#FFCC00"/>
    <circle cx="84" cy="38" r="4" fill="#FFCC00"/>
    <circle cx="42" cy="56" r="4" fill="#FFCC00"/>
    <circle cx="78" cy="56" r="4" fill="#FFCC00"/>
    <circle cx="60" cy="62" r="4" fill="#FFCC00"/>
    <circle cx="36" cy="50" r="4" fill="#FFCC00"/>
    <circle cx="84" cy="50" r="4" fill="#FFCC00"/>
    <circle cx="48" cy="30" r="4" fill="#FFCC00"/>
    <circle cx="72" cy="30" r="4" fill="#FFCC00"/>
  </g>
</svg>
